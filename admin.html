<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Football Experience</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,600;0,700;0,800;0,900;1,800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{ box-sizing:border-box; }
  :root{
    --bg:#070708; --ink:#F4F4F0; --ink-dim:rgba(244,244,240,.66); --ink-mute:rgba(244,244,240,.42);
    --line:rgba(244,244,240,.1); --line-2:rgba(244,244,240,.18); --card:#121215;
    --accent:#d11a2a; --green:#29c46b; --maxw:min(1180px, 92vw); --ease:cubic-bezier(.22,1,.36,1);
  }
  body{ margin:0; background:var(--bg); color:var(--ink); font-family:Inter,system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
  a{ color:inherit; text-decoration:none; } button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  input,select{ font-family:inherit; }
  .display{ font-family:'Barlow Condensed',sans-serif; font-weight:800; text-transform:uppercase; line-height:.9; }
  .mono{ font-family:'JetBrains Mono',monospace; }
  .wrap{ max-width:var(--maxw); margin:0 auto; padding:0 24px; }
  .eyebrow{ font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.2em; color:var(--ink-mute); text-transform:uppercase; }

  nav.main{ position:sticky; top:0; z-index:100; background:rgba(7,7,8,.92); backdrop-filter:blur(14px); border-bottom:1px solid var(--line); }
  .nav-in{ max-width:var(--maxw); margin:0 auto; padding:13px 24px; display:flex; align-items:center; gap:14px; }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand .stripes{ display:flex; gap:3px; } .brand .stripes span{ width:4px; height:22px; border-radius:1px; }
  .brand b{ font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:17px; text-transform:uppercase; line-height:.92; }
  .badge-admin{ font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.12em; color:var(--accent); border:1px solid var(--accent); padding:4px 9px; border-radius:6px; }
  .nav-act{ margin-left:auto; display:flex; gap:10px; }
  .nbtn{ padding:9px 15px; border-radius:9px; font-size:13px; font-weight:600; border:1px solid var(--line-2); color:var(--ink-dim); }
  .nbtn:hover{ color:var(--ink); border-color:var(--ink); }
  .nbtn.pri{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .nbtn.danger{ color:#ff8080; border-color:rgba(255,128,128,.4); }

  header.head{ padding:34px 0 18px; }
  header.head h1{ font-size:clamp(34px,5vw,56px); }
  header.head p{ color:var(--ink-dim); font-size:14px; margin:8px 0 0; }
  .stat-strip{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:22px 0 10px; }
  @media(max-width:720px){ .stat-strip{ grid-template-columns:repeat(2,1fr); } }
  .ss{ border:1px solid var(--line); border-radius:14px; background:var(--card); padding:16px 18px; }
  .ss .n{ font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:32px; line-height:1; }
  .ss .l{ font-size:11px; color:var(--ink-mute); margin-top:5px; font-family:'JetBrains Mono',monospace; letter-spacing:.08em; }

  .toolbar{ display:flex; align-items:center; gap:12px; margin:28px 0 16px; flex-wrap:wrap; }
  .toolbar .filter{ display:flex; gap:6px; }
  .chip{ padding:8px 14px; border-radius:999px; border:1px solid var(--line-2); font-size:13px; color:var(--ink-dim); }
  .chip.on{ background:var(--ink); color:#0a0a0a; border-color:var(--ink); font-weight:600; }
  .toolbar .sp{ flex:1; }

  /* match table */
  .mtable{ display:flex; flex-direction:column; gap:10px; }
  .mt-row{ border:1px solid var(--line); border-radius:14px; background:var(--card); padding:16px 18px; }
  .mt-main{ display:grid; grid-template-columns:auto 1fr auto auto auto; gap:16px; align-items:center; }
  @media(max-width:760px){ .mt-main{ grid-template-columns:auto 1fr; } }
  .mt-crest{ width:46px; height:46px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:18px; color:#fff; border:2px solid rgba(255,255,255,.25); }
  .mt-info .vs{ font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:19px; text-transform:uppercase; }
  .mt-info .meta{ font-size:12px; color:var(--ink-dim); margin-top:3px; }
  .mt-status{ font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.08em; padding:5px 9px; border-radius:6px; }
  .mt-status.on-sale{ color:var(--green); background:rgba(41,196,107,.12); }
  .mt-status.past{ color:var(--ink-mute); background:rgba(255,255,255,.05); }
  .mt-from{ font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink-dim); }
  .mt-actions{ display:flex; gap:8px; }
  .iconbtn{ width:36px; height:36px; border-radius:9px; border:1px solid var(--line-2); display:flex; align-items:center; justify-content:center; color:var(--ink-dim); }
  .iconbtn:hover{ color:var(--ink); border-color:var(--ink); }
  .iconbtn.danger:hover{ color:#ff8080; border-color:rgba(255,128,128,.5); }

  /* editor (expand) */
  .editor{ margin-top:16px; padding-top:16px; border-top:1px solid var(--line); display:none; }
  .editor.open{ display:block; }
  .ed-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  @media(max-width:760px){ .ed-grid{ grid-template-columns:1fr 1fr; } }
  .fld label{ display:block; font-size:10px; color:var(--ink-mute); font-family:'JetBrains Mono',monospace; letter-spacing:.08em; margin-bottom:5px; }
  .fld input, .fld select{ width:100%; padding:10px 12px; border-radius:9px; background:rgba(255,255,255,.04); border:1px solid var(--line); color:var(--ink); font-size:13px; }
  .fld input:focus, .fld select:focus{ outline:none; border-color:var(--accent); }
  .sectors-edit{ margin-top:16px; }
  .sectors-edit h4{ font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.12em; color:var(--ink-mute); margin:0 0 10px; text-transform:uppercase; }
  .sec-row{ display:grid; grid-template-columns:20px 1fr 130px 100px; gap:12px; align-items:center; padding:8px 0; border-bottom:1px solid var(--line); }
  .sec-row .sw{ width:16px; height:16px; border-radius:5px; }
  .sec-row .snm{ font-size:13px; }
  .sec-row .pwrap{ display:flex; align-items:center; gap:6px; }
  .sec-row .pwrap span{ font-size:12px; color:var(--ink-mute); }
  .sec-row .pwrap input{ width:90px; padding:8px 10px; border-radius:8px; background:rgba(255,255,255,.04); border:1px solid var(--line); color:var(--ink); font-size:13px; font-family:'JetBrains Mono',monospace; }
  .avail-toggle{ font-size:11px; padding:6px 10px; border-radius:7px; border:1px solid var(--line-2); color:var(--ink-dim); }
  .avail-toggle.on{ color:var(--green); border-color:rgba(41,196,107,.4); background:rgba(41,196,107,.08); }
  .ed-foot{ display:flex; gap:10px; margin-top:18px; }
  .ed-foot .save{ background:var(--green); color:#04210f; padding:11px 20px; border-radius:10px; font-weight:700; font-size:13px; }
  .ed-foot .cancel{ border:1px solid var(--line-2); padding:11px 20px; border-radius:10px; font-size:13px; color:var(--ink-dim); }
  .toast{ position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--green); color:#04210f; padding:12px 22px; border-radius:12px; font-weight:600; font-size:14px; opacity:0; transition:all .3s var(--ease); z-index:9500; pointer-events:none; }
  .toast.show{ opacity:1; transform:translateX(-50%); }
</style>
</head>
<body>

<nav class="main">
  <div class="nav-in">
    <a class="brand" href="inicio.html">
      <span class="stripes"><span style="background:#d11a2a"></span><span style="background:#0e5c2f"></span><span style="background:#fff"></span></span>
      <b>Football Experience</b>
    </a>
    <span class="badge-admin">ADMIN</span>
    <div class="nav-act">
      <button class="nbtn danger" id="resetBtn">Restablecer datos</button>
      <a class="nbtn" href="inicio.html">Ver sitio</a>
    </div>
  </div>
</nav>

<header class="head">
  <div class="wrap">
    <div class="eyebrow">Gestión de partidos</div>
    <h1 class="display">Panel de administración</h1>
    <p>Crea partidos, ajusta precios por sector y elimina los antiguos. Los cambios se reflejan al instante en el sitio.</p>
    <div class="stat-strip" id="stats"></div>
  </div>
</header>

<div class="wrap">
  <div class="toolbar">
    <div class="filter" id="filter">
      <button class="chip on" data-f="all">Todos</button>
      <button class="chip" data-f="flamengo">Flamengo</button>
      <button class="chip" data-f="fluminense">Fluminense</button>
      <button class="chip" data-f="botafogo">Botafogo</button>
      <button class="chip" data-f="past">Pasados</button>
    </div>
    <div class="sp"></div>
    <button class="nbtn pri" id="newBtn">+ Nuevo partido</button>
  </div>
  <div class="mtable" id="table"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* inlined: mrc/store.js */
// ════════════════════════════════════════════════════════════
// FOOTBALL EXPERIENCE · MARACANÃ — Data Store (localStorage)
// Gestiona equipos, partidos (con sectores/precios editables),
// reservas y FAQ. Persiste en localStorage para administración.
// ════════════════════════════════════════════════════════════
// ════════════════════════════════════════════════════════════
// FOOTBALL EXPERIENCE · MARACANÃ — Data Store (localStorage)
// Gestiona equipos, partidos (con sectores/precios editables),
// reservas y FAQ. Persiste en localStorage para administración.
// ════════════════════════════════════════════════════════════
window.MRC = (function () {
  const KEY_MATCHES = 'mrc.matches.v4';
  const KEY_BOOKINGS = 'mrc.bookings.v2';

  // ── EQUIPOS ──────────────────────────────────────────────
  const TEAMS = {
    flamengo: {
      id:'flamengo', name:'Flamengo', full:'Clube de Regatas do Flamengo',
      short:'FLA', nickname:'Mengão', founded:1895, fans:'42M',
      primary:'#C52613', secondary:'#000000', ink:'#000',
      pattern:'hoops', stadium:'Maracanã', position:2,
      record:{ pts:34, pj:17, g:10, e:4, p:3 },
      coach:'Leonardo Jardim',
      colors:['#C52613','#000000','#FFFFFF'],
      crest:'assets/equipos/flamengo.png',
      banner:'assets/banners/flamengo.png',
      bio:'El club más popular de Brasil. Campeón del mundo en 1981 y tetracampeón de la Libertadores. La Nación Rubro-Negra llena el Maracanã como nadie.',
      titles:[
        { n:'1', l:'Mundial de Clubes 1981' }, { n:'4', l:'Libertadores' },
        { n:'8', l:'Brasileirão' }, { n:'5', l:'Copa do Brasil' },

      ],
      history:[
        { year:'1895', t:'Fundación', x:'Nace como club de remo en la zona sur de Rio.' },
        { year:'1981', t:'Campeón del mundo', x:'Conquista el Mundial de Clubes con Zico de figura.' },
        { year:'2019', t:'Gloria en Lima', x:'Gabigol da vuelta la final de Libertadores ante River.' },
        { year:'2022', t:'Doblete', x:'Libertadores y Copa do Brasil en una misma temporada.' },
        { year:'2025', t:'Tetracampeón continental', x:'Cuarta Libertadores de la historia del club.' },
      ],
    },
    fluminense: {
      id:'fluminense', name:'Fluminense', full:'Fluminense Football Club',
      short:'FLU', nickname:'Tricolor', founded:1902, fans:'5M',
      primary:'#870A28', secondary:'#00613C', ink:'#00613C',
      pattern:'tricolor', stadium:'Maracanã', position:3,
      record:{ pts:31, pj:18, g:9, e:4, p:5 },
      coach:'Luis Zubeldía',
      colors:['#870A28','#00613C','#FFFFFF'],
      crest:'assets/equipos/fluminense.png',
      banner:'assets/banners/fluminense.jpg',
      bio:'Pionero del fútbol carioca y dueño de un juego elegante. Campeón de la Libertadores 2023 en casa, en el corazón del Maracanã.',
      titles:[
        { n:'1', l:'Libertadores 2023' }, { n:'1', l:'Recopa Sudamericana 2024' },
        { n:'1', l:'Copa Rio Internacional 1952' }, { n:'4', l:'Brasileirão' },
        { n:'1', l:'Copa do Brasil' }, { n:'33', l:'Campeonato Carioca' },
      ],
      history:[
        { year:'1902', t:'Fundación', x:'Primer gran club de fútbol de Rio de Janeiro.' },
        { year:'1970', t:'Era dorada', x:'La "Máquina Tricolor" domina el fútbol carioca.' },
        { year:'2012', t:'Brasileirão', x:'Conquista el título nacional con autoridad.' },
        { year:'2023', t:'Gloria continental', x:'Primera Libertadores, en el Maracanã, con Cano y Ganso.' },
        { year:'2024', t:'Recopa Sudamericana', x:'Suma un título continental más a su palmarés.' },
      ],
    },
    botafogo: {
      id:'botafogo', name:'Botafogo', full:'Botafogo de Futebol e Regatas',
      short:'BOT', nickname:'Fogão', founded:1904, fans:'4M',
      primary:'#000000', secondary:'#FFFFFF', ink:'#fff',
      pattern:'star', stadium:'Nilton Santos / Maracanã', position:12,
      record:{ pts:22, pj:17, g:6, e:4, p:7 },
      coach:'Franclim Carvalho',
      colors:['#000000','#FFFFFF'],
      crest:'assets/equipos/botafogo.png',
      banner:'assets/banners/botafogo.png',
      bio:'La estrella solitaria. Cuna de Garrincha y campeón de la Libertadores 2024. Vive una era de renacimiento absoluto.',
      titles:[
        { n:'1', l:'Libertadores 2024' }, { n:'1', l:'Copa CONMEBOL 1993' },
        { n:'3', l:'Brasileirão (incl. 2024)' }, { n:'4', l:'Torneo Rio-São Paulo' },
        { n:'21', l:'Campeonato Carioca' },
      ],
      history:[
        { year:'1904', t:'Fundación', x:'Nace el club de la estrella solitaria.' },
        { year:'1962', t:'Garrincha mundial', x:'El Mané brilla en el bicampeonato de Brasil.' },
        { year:'1995', t:'Brasileirão', x:'Túlio Maravilha lidera el título nacional.' },
        { year:'2024', t:'Gloria sudamericana', x:'Conquista la Libertadores y el Brasileirão.' },
      ],
    },
    vasco: {
      id:'vasco', name:'Vasco da Gama', full:'Club de Regatas Vasco da Gama',
      short:'VAS', nickname:'Gigante da Colina', founded:1898, fans:'8M',
      primary:'#000000', secondary:'#FFFFFF', ink:'#fff',
      pattern:'hoops', stadium:'São Januário / Maracanã', position:17,
      record:{ pts:20, pj:18, g:5, e:5, p:8 },
      coach:'Renato Gaúcho',
      colors:['#E2231A','#000000','#FFFFFF','#FFA400'],
      crest:'assets/equipos/vasco-da-gama.png',
      banner:'assets/banners/vasco-da-gama.png',
      bio:'El gigante que abrió el fútbol brasileño a todas las razas y clases sociales. Campeón de la Libertadores 1998 y pionero sudamericano desde 1948.',
      titles:[
        { n:'1', l:'Libertadores 1998' }, { n:'1', l:'Campeonato Sudamericano de Campeones 1948' },
        { n:'1', l:'Copa Mercosur 2000' }, { n:'4', l:'Brasileirão' },
        { n:'1', l:'Copa do Brasil 2011' }, { n:'24', l:'Campeonato Carioca' },
      ],
      history:[
        { year:'1898', t:'Fundación', x:'Nace el Club de Regatas Vasco da Gama.' },
        { year:'1948', t:'Pionero sudamericano', x:'Campeón Sudamericano de Campeones, precursor reconocido de la Libertadores.' },
        { year:'1998', t:'Gloria continental', x:'Conquista la Copa Libertadores de América.' },
        { year:'2000', t:'Copa Mercosur', x:'Suma otro título internacional a su palmarés.' },
        { year:'2011', t:'Copa do Brasil', x:'Levanta el título nacional una vez más.' },
      ],
    },
  };

  // ── SECTORES DEL MARACANÃ (según mapa oficial) ───────────
  // color = referencia visual del mapa entregado
  const SECTOR_DEFS = [
    { id:'leste-inferior', name:'Leste Inferior',  side:'oeste', color:'#b81d2c', defaultPrice:320, desc:'Lateral bajo, cerca del campo. La mejor relación vista-precio.' },
    { id:'leste-superior', name:'Leste Superior',  side:'oeste', color:'#7c1420', defaultPrice:300, desc:'Lateral alto con vista panorámica del juego.' },
    { id:'norte',          name:'Norte',           side:'norte', color:'#1f8a44', defaultPrice:280, desc:'La curva del aliento. Banderas, cantos y la barra.' },
    { id:'sul',            name:'Sul',             side:'sul',   color:'#d6a72e', defaultPrice:280, desc:'Curva sur, ambiente familiar y vibrante.' },
    { id:'oeste',          name:'Maracanã Mais (Oeste)', side:'este', color:'#3a3a42', defaultPrice:520, desc:'Sector premium: asientos centrales, lounge y servicio.' },
    { id:'visitante',      name:'Visitante',       side:'norte-este', color:'#6a6a72', defaultPrice:260, desc:'Sector reservado a la hinchada visitante.' },
  ];

  function sectorDef(id) { return SECTOR_DEFS.find(s => s.id === id); }

  // ── PARTIDOS SEMILLA ─────────────────────────────────────
  function seedMatches() {
    const slug = (s) => String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    // Deterministic id (date+team+rival), NOT random: every page seeds its own
    // copy of this array independently, so a random id here would make
    // comprar.html?match=ID resolve to a different match than the one that
    // generated the link whenever the two pages don't share localStorage
    // (e.g. file:// origins, or a fresh/incognito tab) — Comprar would look
    // like it silently does nothing.
    const mk = (over) => Object.assign({
      id: 'm-' + slug(over.date) + '-' + slug(over.teamId) + '-' + slug(over.oppShort || over.opp),
      status: 'on-sale', // on-sale | sold-out | past
      includes: ['Entrada', 'Guiamiento en 3 idiomas', 'Transporte ida y vuelta'],
      sectors: SECTOR_DEFS.map(s => ({ id: s.id, price: s.defaultPrice, available: true })),
    }, over);

    const classA = (extra) => SECTOR_DEFS.map(s => ({ id: s.id, price: s.defaultPrice + extra, available: true }));

    // Calendario oficial Maracanã · Julio y Agosto 2026 (entregado por el cliente)
    return [
      mk({ teamId:'fluminense', opp:'Bragantino', oppShort:'RBB', comp:'Brasileirão',
        date:'2026-07-22T21:30', venue:'Maracanã' }),
      mk({ teamId:'flamengo', opp:'São Paulo', oppShort:'SAO', comp:'Brasileirão',
        date:'2026-07-26T16:00', venue:'Maracanã', sectors: classA(60) }),
      mk({ teamId:'fluminense', opp:'Bahía', oppShort:'BAH', comp:'Brasileirão',
        date:'2026-07-29T19:00', venue:'Maracanã' }),
      mk({ teamId:'vasco', opp:'Fluminense', oppShort:'FLU', comp:'Copa do Brasil',
        date:'2026-08-01T18:30', venue:'Maracanã', sectors: classA(80) }),
      mk({ teamId:'fluminense', opp:'Vasco da Gama', oppShort:'VAS', comp:'Copa do Brasil',
        date:'2026-08-05T21:30', venue:'Maracanã', sectors: classA(80) }),
      mk({ teamId:'flamengo', opp:'Vitória', oppShort:'VIT', comp:'Brasileirão',
        date:'2026-08-09T16:00', venue:'Maracanã' }),
      mk({ teamId:'fluminense', opp:'Ind. Rivadavia', oppShort:'IRI', comp:'Libertadores',
        date:'2026-08-11T21:30', venue:'Maracanã', sectors: classA(70) }),
      mk({ teamId:'fluminense', opp:'Palmeiras', oppShort:'PAL', comp:'Brasileirão',
        date:'2026-08-16T16:00', venue:'Maracanã' }),
      mk({ teamId:'flamengo', opp:'Cruzeiro', oppShort:'CRU', comp:'Libertadores',
        date:'2026-08-19T21:30', venue:'Maracanã', sectors: classA(60) }),
      mk({ teamId:'fluminense', opp:'Remo', oppShort:'REM', comp:'Copa do Brasil',
        date:'2026-08-23T16:00', venue:'Maracanã' }),
      mk({ teamId:'flamengo', opp:'Botafogo', oppShort:'BOT', comp:'Brasileirão',
        date:'2026-08-30T16:00', venue:'Maracanã', sectors: classA(100) }),
    ];
  }

  // ── PERSISTENCIA ─────────────────────────────────────────
  function load(key, fallback) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
    catch (e) { return fallback; }
  }
  function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {} }

  let matches = load(KEY_MATCHES, null);
  if (!matches) { matches = seedMatches(); save(KEY_MATCHES, matches); }

  let bookings = load(KEY_BOOKINGS, []);

  // ── API ──────────────────────────────────────────────────
  function allMatches() { return matches.slice().sort((a,b)=> new Date(a.date)-new Date(b.date)); }
  function matchesByTeam(teamId) { return allMatches().filter(m => m.teamId === teamId); }
  function upcomingByTeam(teamId) { return matchesByTeam(teamId).filter(m => !isPast(m)); }
  function getMatch(id) { return matches.find(m => m.id === id); }
  function isPast(m) { return new Date(m.date).getTime() < Date.now(); }

  function saveMatch(m) {
    const i = matches.findIndex(x => x.id === m.id);
    if (i >= 0) matches[i] = m; else matches.push(m);
    save(KEY_MATCHES, matches);
  }
  function deleteMatch(id) { matches = matches.filter(m => m.id !== id); save(KEY_MATCHES, matches); }
  function newMatchTemplate(teamId) {
    return {
      id: 'm_' + Math.random().toString(36).slice(2, 9),
      teamId: teamId || 'flamengo', opp:'', oppShort:'', comp:'Brasileirão',
      date: new Date(Date.now()+7*864e5).toISOString().slice(0,16), venue:'Maracanã',
      status:'on-sale', includes:['Entrada','Guiamiento en 3 idiomas','Transporte ida y vuelta'],
      sectors: SECTOR_DEFS.map(s => ({ id:s.id, price:s.defaultPrice, available:true })),
    };
  }

  // ── RESERVAS / COMPRA ────────────────────────────────────
  // Política: pago 100% del valor. Cancelación hasta 7 días antes.
  function createBooking({ matchId, sectorId, qty, name, email }) {
    const m = getMatch(matchId);
    const sec = m.sectors.find(s => s.id === sectorId);
    const unit = sec.price;
    const total = unit * qty;
    const b = {
      id: 'FE-' + Math.random().toString(36).slice(2, 8).toUpperCase(),
      matchId, sectorId, qty, name, email,
      unit, total, paid: total, // 100%
      createdAt: Date.now(),
      matchDate: m.date,
      status: 'confirmed',
    };
    bookings.unshift(b);
    save(KEY_BOOKINGS, bookings);
    return b;
  }
  function getBookings() { return bookings.slice(); }
  function canCancel(b) {
    const matchTime = new Date(b.matchDate).getTime();
    return b.status === 'confirmed' && (matchTime - Date.now()) >= 7 * 864e5;
  }
  function cancelBooking(id) {
    const b = bookings.find(x => x.id === id);
    if (b && canCancel(b)) { b.status = 'cancelled'; save(KEY_BOOKINGS, bookings); return true; }
    return false;
  }
  function resetData() { matches = seedMatches(); save(KEY_MATCHES, matches); bookings = []; save(KEY_BOOKINGS, bookings); }

  // ── FAQ (chatbot) ────────────────────────────────────────
  const FAQ = [
    { q:'¿Qué incluye la entrada?', a:'Todas nuestras entradas son servicio completo: incluyen el acceso al estadio, guiamiento en 3 idiomas (español, inglés y portugués) y transporte ida y vuelta.' },
    { q:'¿Cómo es el acceso al estadio?', a:'El acceso es biométrico: tu rostro es tu entrada. Te registras una vez vía Bepass y entras sin filas ni ticket de papel.' },
    { q:'¿Puedo cancelar mi compra?', a:'Sí. Puedes cancelar hasta 7 días (1 semana) antes del partido y se te reembolsa el 100%. Pasado ese plazo la compra no es reembolsable.' },
    { q:'¿Cuánto cuesta y cómo pago?', a:'El precio varía por sector y por partido. Tu anfitrión te confirma el precio final por WhatsApp y ahí coordinan el pago (los precios de referencia pueden cambiar de un partido a otro).' },
    { q:'¿Qué sectores hay en el Maracanã?', a:'Leste Inferior, Leste Superior, Norte, Sul, Maracanã Mais (Oeste, premium) y Visitante. Los precios cambian según el partido.' },
    { q:'¿El transporte de dónde sale?', a:'Coordinamos un punto de embarque y un anfitrión te acompaña ida y vuelta. La hora exacta se confirma por WhatsApp.' },
    { q:'¿Atienden por WhatsApp?', a:'Sí, tienes un anfitrión por WhatsApp para coordinar tu embarque y resolver cualquier duda antes, durante y después del partido.' },
  ];

  const WHATSAPP = '5521999990000'; // número de contacto (placeholder)

  return {
    TEAMS, SECTOR_DEFS, sectorDef, FAQ, WHATSAPP,
    allMatches, matchesByTeam, upcomingByTeam, getMatch, isPast,
    saveMatch, deleteMatch, newMatchTemplate,
    createBooking, getBookings, canCancel, cancelBooking, resetData,
    fmt: (n) => 'R$ ' + Number(n).toLocaleString('pt-BR'),
  };
})();

</script>

<script>
(function(){
  const { TEAMS, SECTOR_DEFS, sectorDef, allMatches, isPast, saveMatch, deleteMatch, newMatchTemplate, getBookings, fmt, resetData } = MRC;
  let filter='all'; let editingId=null; let draft=null;

  const crestBg=(t)=>`linear-gradient(135deg,${t.primary},${t.secondary||'#111'})`;
  const toast=(m)=>{ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); };

  function renderStats(){
    const all=allMatches();
    const up=all.filter(m=>!isPast(m));
    const bk=getBookings().filter(b=>b.status==='confirmed');
    const revenue=bk.reduce((s,b)=>s+b.total,0);
    const data=[
      { n:all.length, l:'PARTIDOS TOTALES' },
      { n:up.length, l:'EN VENTA' },
      { n:bk.length, l:'RESERVAS' },
      { n:fmt(revenue), l:'INGRESOS' },
    ];
    document.getElementById('stats').innerHTML=data.map(d=>`<div class="ss"><div class="n">${d.n}</div><div class="l">${d.l}</div></div>`).join('');
  }

  function visible(){
    let list=allMatches();
    if(filter==='past') return list.filter(isPast);
    if(filter!=='all') return list.filter(m=>m.teamId===filter && !isPast(m));
    return list;
  }

  function render(){
    renderStats();
    const tb=document.getElementById('table'); tb.innerHTML='';
    const list=visible();
    if(!list.length){ tb.innerHTML='<div style="color:var(--ink-mute);padding:30px;text-align:center">No hay partidos para este filtro.</div>'; return; }
    list.forEach(m=>{
      const t=TEAMS[m.teamId];
      const dt=new Date(m.date);
      const day=dt.toLocaleDateString('es',{weekday:'short',day:'2-digit',month:'short'});
      const time=dt.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
      const past=isPast(m);
      const from=Math.min(...m.sectors.filter(s=>s.available).map(s=>s.price));
      const row=document.createElement('div'); row.className='mt-row'; row.dataset.id=m.id;
      row.innerHTML=`
        <div class="mt-main">
          <div class="mt-crest" style="background:${crestBg(t)}">${t.short}</div>
          <div class="mt-info"><div class="vs">${t.short} × ${m.oppShort||m.opp||'—'}</div><div class="meta">${day} · ${time} · ${m.comp} · ${m.venue}</div></div>
          <span class="mt-status ${past?'past':'on-sale'}">${past?'PASADO':'EN VENTA'}</span>
          <span class="mt-from">desde ${isFinite(from)?fmt(from):'—'}</span>
          <div class="mt-actions">
            <button class="iconbtn" data-edit="${m.id}" title="Editar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 20h4L18 10l-4-4L4 16v4z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M14 6l4 4" stroke="currentColor" stroke-width="1.7"/></svg></button>
            <button class="iconbtn danger" data-del="${m.id}" title="Eliminar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 7h14M10 7V5h4v2M6 7l1 13h10l1-13" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
          </div>
        </div>
        <div class="editor" id="ed-${m.id}"></div>`;
      tb.appendChild(row);
    });
    tb.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',()=>openEditor(b.dataset.edit)));
    tb.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>{
      if(confirm('¿Eliminar este partido? Esta acción no se puede deshacer.')){ deleteMatch(b.dataset.del); toast('Partido eliminado'); render(); }
    }));
    if(editingId){ const ed=document.getElementById('ed-'+editingId); if(ed) buildEditor(ed, draft); }
  }

  function openEditor(id){
    if(editingId===id){ editingId=null; draft=null; render(); return; }
    const m=MRC.getMatch(id);
    draft=JSON.parse(JSON.stringify(m));
    editingId=id;
    render();
    const row=document.querySelector(`.mt-row[data-id="${id}"]`);
    if(row) row.scrollIntoView({behavior:'smooth',block:'center'});
  }

  function buildEditor(container, m){
    container.classList.add('open');
    const dtVal=(m.date||'').slice(0,16);
    container.innerHTML=`
      <div class="ed-grid">
        <div class="fld"><label>EQUIPO LOCAL</label><select data-k="teamId">${Object.values(TEAMS).map(t=>`<option value="${t.id}" ${t.id===m.teamId?'selected':''}>${t.name}</option>`).join('')}</select></div>
        <div class="fld"><label>RIVAL</label><input data-k="opp" value="${m.opp||''}" placeholder="Ej. Palmeiras"></div>
        <div class="fld"><label>SIGLA RIVAL</label><input data-k="oppShort" value="${m.oppShort||''}" placeholder="PAL" maxlength="4"></div>
        <div class="fld"><label>COMPETICIÓN</label><input data-k="comp" value="${m.comp||''}" placeholder="Brasileirão"></div>
        <div class="fld"><label>FECHA Y HORA</label><input type="datetime-local" data-k="date" value="${dtVal}"></div>
        <div class="fld"><label>ESTADIO</label><input data-k="venue" value="${m.venue||''}" placeholder="Maracanã"></div>
      </div>
      <div class="sectors-edit">
        <h4>Precios y disponibilidad por sector</h4>
        ${SECTOR_DEFS.map(def=>{
          const s=m.sectors.find(x=>x.id===def.id)||{price:def.defaultPrice,available:true};
          return `<div class="sec-row" data-sec="${def.id}">
            <span class="sw" style="background:${def.color}"></span>
            <span class="snm">${def.name}</span>
            <span class="pwrap">R$ <input type="number" data-price="${def.id}" value="${s.price}" min="0" step="10"></span>
            <button class="avail-toggle ${s.available?'on':''}" data-avail="${def.id}">${s.available?'Disponible':'Agotado'}</button>
          </div>`;
        }).join('')}
      </div>
      <div class="ed-foot">
        <button class="save" id="saveBtn">Guardar cambios</button>
        <button class="cancel" id="cancelBtn">Cancelar</button>
      </div>`;

    container.querySelectorAll('[data-k]').forEach(inp=>{
      inp.addEventListener('input',()=>{ draft[inp.dataset.k]=inp.value; });
    });
    container.querySelectorAll('[data-price]').forEach(inp=>{
      inp.addEventListener('input',()=>{ const s=draft.sectors.find(x=>x.id===inp.dataset.price); if(s) s.price=Number(inp.value)||0; });
    });
    container.querySelectorAll('[data-avail]').forEach(btn=>{
      btn.addEventListener('click',()=>{ const s=draft.sectors.find(x=>x.id===btn.dataset.avail); if(s){ s.available=!s.available; btn.classList.toggle('on',s.available); btn.textContent=s.available?'Disponible':'Agotado'; } });
    });
    container.querySelector('#saveBtn').addEventListener('click',()=>{
      if(!draft.opp){ toast('Falta el rival'); return; }
      if(!draft.oppShort) draft.oppShort=draft.opp.slice(0,3).toUpperCase();
      saveMatch(draft); editingId=null; draft=null; toast('Partido guardado'); render();
    });
    container.querySelector('#cancelBtn').addEventListener('click',()=>{ editingId=null; draft=null; render(); });
  }

  document.getElementById('newBtn').addEventListener('click',()=>{
    const m=newMatchTemplate(filter!=='all'&&filter!=='past'?filter:'flamengo');
    saveMatch(m); editingId=m.id; draft=JSON.parse(JSON.stringify(m));
    filter='all'; document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.dataset.f==='all'));
    render(); toast('Nuevo partido — edítalo');
  });
  document.getElementById('resetBtn').addEventListener('click',()=>{
    if(confirm('¿Restablecer todos los partidos a los valores de fábrica? Se perderán tus cambios.')){ resetData(); editingId=null; render(); toast('Datos restablecidos'); }
  });
  document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
    document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on')); c.classList.add('on'); filter=c.dataset.f; editingId=null; render();
  }));

  render();
})();
</script>
