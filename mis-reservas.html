<style>
  *,*::before,*::after{ box-sizing:border-box; }
  :root{
    --bg:#070708; --ink:#F4F4F0; --ink-dim:rgba(244,244,240,.66); --ink-mute:rgba(244,244,240,.42);

    --accent:#d11a2a; --green:#29c46b; --maxw:min(980px, 92vw); --ease:cubic-bezier(.22,1,.36,1);
  }
  body{ margin:0; background:var(--bg); color:var(--ink); font-family:Inter,system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
  a{ color:inherit; text-decoration:none; } button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  .display{ font-family:'Barlow Condensed',sans-serif; font-weight:800; text-transform:uppercase; line-height:.9; }
  .mono{ font-family:'JetBrains Mono',monospace; }
  .wrap{ max-width:var(--maxw); margin:0 auto; padding:0 24px; }
  .eyebrow{ font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.2em; color:var(--ink-mute); text-transform:uppercase; }

  nav.main{ position:sticky; top:0; z-index:100; background:rgba(7,7,8,.92); backdrop-filter:blur(14px); border-bottom:1px solid var(--line); }
  .nav-in{ max-width:var(--maxw); margin:0 auto; padding:13px 24px; display:flex; align-items:center; gap:14px; }

  .brand .stripes{ display:flex; gap:3px; } .brand .stripes span{ width:4px; height:22px; border-radius:1px; }
  .brand b{ font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:17px; text-transform:uppercase; line-height:.92; }
  .nav-act{ margin-left:auto; } .nbtn{ padding:9px 15px; border-radius:9px; font-size:13px; font-weight:600; border:1px solid var(--line-2); color:var(--ink-dim); }
  .nbtn:hover{ color:var(--ink); border-color:var(--ink); }

  header.head{ padding:36px 0 8px; }
  header.head h1{ font-size:clamp(34px,5vw,56px); }
  header.head p{ color:var(--ink-dim); font-size:14px; margin:8px 0 0; }

  .tabs{ display:flex; gap:6px; margin:24px 0 20px; }
  .tab{ padding:9px 16px; border-radius:999px; border:1px solid var(--line-2); font-size:13px; color:var(--ink-dim); }
  .tab.on{ background:var(--ink); color:#0a0a0a; border-color:var(--ink); font-weight:600; }

  .list{ display:flex; flex-direction:column; gap:14px; padding-bottom:80px; }
  .bk{ border:1px solid var(--line); border-radius:18px; background:var(--card); overflow:hidden; }
  .bk-top{ display:flex; align-items:center; gap:16px; padding:18px 20px; }
  .bk-crest{ width:54px; height:54px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:22px; color:#fff; border:2px solid rgba(255,255,255,.25); flex-shrink:0; }
  .bk-info{ flex:1; min-width:0; }
  .bk-info .vs{ font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:22px; text-transform:uppercase; line-height:.95; }
  .bk-info .meta{ font-size:12px; color:var(--ink-dim); margin-top:4px; }
  .bk-state{ font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.08em; padding:5px 10px; border-radius:6px; }
  .bk-state.confirmed{ color:var(--green); background:rgba(41,196,107,.12); }
  .bk-state.cancelled{ color:#ff8080; background:rgba(255,128,128,.12); }
  .bk-state.past{ color:var(--ink-mute); background:rgba(255,255,255,.05); }
  .bk-foot{ display:flex; align-items:center; gap:14px; padding:14px 20px; border-top:1px solid var(--line); background:rgba(255,255,255,.015); flex-wrap:wrap; }
  .bk-foot .kv{ font-size:12px; color:var(--ink-dim); } .bk-foot .kv b{ color:var(--ink); font-family:'JetBrains Mono',monospace; }
  .bk-foot .sp{ flex:1; }
  .bk-foot .qr{ width:42px; height:42px; border-radius:8px; background:#fff; padding:4px; }
  .act{ padding:10px 16px; border-radius:10px; font-size:13px; font-weight:600; }
  .act.cancel{ border:1px solid rgba(255,128,128,.4); color:#ff8080; }
  .act.cancel:hover{ background:rgba(255,128,128,.1); }
  .act.cancel:disabled{ opacity:.4; cursor:not-allowed; }
  .act.wa{ background:#25D366; color:#fff; display:inline-flex; align-items:center; gap:7px; }
  .cancel-note{ font-size:11px; color:var(--ink-mute); }

  .empty{ text-align:center; padding:70px 20px; color:var(--ink-mute); }
  .empty svg{ opacity:.4; margin-bottom:14px; }
  .empty a{ color:var(--accent); }

  const TEAMS = {

      colors:['#870A28','#00613C','#FFFFFF'],

      titles:[
        { n:'1', l:'Libertadores 2023' }, { n:'1', l:'Recopa Sudamericana 2024' },

      ],

      titles:[

      ],
      history:[
        { year:'1904', t:'Fundación', x:'Nace el club de la estrella solitaria.' },
        { year:'1962', t:'Garrincha mundial', x:'El Mané brilla en el bicampeonato de Brasil.' },
        { year:'1995', t:'Brasileirão', x:'Túlio Maravilha lidera el título nacional.' },
        { year:'2024', t:'Gloria sudamericana', x:'Conquista la Libertadores y el Brasileirão.' },
      ],
    },
    vasco: {
      id:'vasco', name:'Vasco da Gama', full:'Club de Regatas Vasco da Gama',
      short:'VAS', nickname:'Gigante da Colina', founded:1898, fans:'8M',
      primary:'#000000', secondary:'#FFFFFF', ink:'#fff',
      pattern:'hoops', stadium:'São Januário / Maracanã', position:17,
      record:{ pts:20, pj:18, g:5, e:5, p:8 },
      coach:'Renato Gaúcho',
      colors:['#E2231A','#000000','#FFFFFF','#FFA400'],
      crest:'assets/equipos/vasco-da-gama.png',
      banner:'assets/banners/vasco-da-gama.png',
      bio:'El gigante que abrió el fútbol brasileño a todas las razas y clases sociales. Campeón de la Libertadores 1998 y pionero sudamericano desde 1948.',
      titles:[
        { n:'1', l:'Libertadores 1998' }, { n:'1', l:'Campeonato Sudamericano de Campeones 1948' },
        { n:'1', l:'Copa Mercosur 2000' }, { n:'4', l:'Brasileirão' },
        { n:'1', l:'Copa do Brasil 2011' }, { n:'24', l:'Campeonato Carioca' },
      ],
      history:[
        { year:'1898', t:'Fundación', x:'Nace el Club de Regatas Vasco da Gama.' },
        { year:'1948', t:'Pionero sudamericano', x:'Campeón Sudamericano de Campeones, precursor reconocido de la Libertadores.' },
        { year:'1998', t:'Gloria continental', x:'Conquista la Copa Libertadores de América.' },
        { year:'2000', t:'Copa Mercosur', x:'Suma otro título internacional a su palmarés.' },
        { year:'2011', t:'Copa do Brasil', x:'Levanta el título nacional una vez más.' },
      ],
    },
  };

  // ── SECTORES DEL MARACANÃ (según mapa oficial) ───────────
  // color = referencia visual del mapa entregado
  const SECTOR_DEFS = [
    { id:'leste-inferior', name:'Leste Inferior',  side:'oeste', color:'#b81d2c', defaultPrice:320, desc:'Lateral bajo, cerca del campo. La mejor relación vista-precio.' },
    { id:'leste-superior', name:'Leste Superior',  side:'oeste', color:'#7c1420', defaultPrice:300, desc:'Lateral alto con vista panorámica del juego.' },
    { id:'norte',          name:'Norte',           side:'norte', color:'#1f8a44', defaultPrice:280, desc:'La curva del aliento. Banderas, cantos y la barra.' },
    { id:'sul',            name:'Sul',             side:'sul',   color:'#d6a72e', defaultPrice:280, desc:'Curva sur, ambiente familiar y vibrante.' },
    { id:'oeste',          name:'Maracanã Mais (Oeste)', side:'este', color:'#3a3a42', defaultPrice:520, desc:'Sector premium: asientos centrales, lounge y servicio.' },
    { id:'visitante',      name:'Visitante',       side:'norte-este', color:'#6a6a72', defaultPrice:260, desc:'Sector reservado a la hinchada visitante.' },
  ];

  function sectorDef(id) { return SECTOR_DEFS.find(s => s.id === id); }

  // ── PARTIDOS SEMILLA ─────────────────────────────────────
  function seedMatches() {
    const slug = (s) => String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    // Deterministic id (date+team+rival), NOT random: every page seeds its own
    // copy of this array independently, so a random id here would make
    // comprar.html?match=ID resolve to a different match than the one that
    // generated the link whenever the two pages don't share localStorage
    // (e.g. file:// origins, or a fresh/incognito tab) — Comprar would look
    // like it silently does nothing.
    const mk = (over) => Object.assign({
      id: 'm-' + slug(over.date) + '-' + slug(over.teamId) + '-' + slug(over.oppShort || over.opp),
      status: 'on-sale', // on-sale | sold-out | past
      includes: ['Entrada', 'Guiamiento en 3 idiomas', 'Transporte ida y vuelta'],
      sectors: SECTOR_DEFS.map(s => ({ id: s.id, price: s.defaultPrice, available: true })),
    }, over);

    const classA = (extra) => SECTOR_DEFS.map(s => ({ id: s.id, price: s.defaultPrice + extra, available: true }));

    // Calendario oficial Maracanã · Julio y Agosto 2026 (entregado por el cliente)
    return [
      mk({ teamId:'fluminense', opp:'Bragantino', oppShort:'RBB', comp:'Brasileirão',
        date:'2026-07-22T21:30', venue:'Maracanã' }),
      mk({ teamId:'flamengo', opp:'São Paulo', oppShort:'SAO', comp:'Brasileirão',
        date:'2026-07-26T16:00', venue:'Maracanã', sectors: classA(60) }),
      mk({ teamId:'fluminense', opp:'Bahía', oppShort:'BAH', comp:'Brasileirão',
        date:'2026-07-29T19:00', venue:'Maracanã' }),
      mk({ teamId:'vasco', opp:'Fluminense', oppShort:'FLU', comp:'Copa do Brasil',
        date:'2026-08-01T18:30', venue:'Maracanã', sectors: classA(80) }),
      mk({ teamId:'fluminense', opp:'Vasco da Gama', oppShort:'VAS', comp:'Copa do Brasil',
        date:'2026-08-05T21:30', venue:'Maracanã', sectors: classA(80) }),
      mk({ teamId:'flamengo', opp:'Vitória', oppShort:'VIT', comp:'Brasileirão',
        date:'2026-08-09T16:00', venue:'Maracanã' }),
      mk({ teamId:'fluminense', opp:'Ind. Rivadavia', oppShort:'IRI', comp:'Libertadores',
        date:'2026-08-11T21:30', venue:'Maracanã', sectors: classA(70) }),
      mk({ teamId:'fluminense', opp:'Palmeiras', oppShort:'PAL', comp:'Brasileirão',
        date:'2026-08-16T16:00', venue:'Maracanã' }),
      mk({ teamId:'flamengo', opp:'Cruzeiro', oppShort:'CRU', comp:'Libertadores',
        date:'2026-08-19T21:30', venue:'Maracanã', sectors: classA(60) }),
      mk({ teamId:'fluminense', opp:'Remo', oppShort:'REM', comp:'Copa do Brasil',
        date:'2026-08-23T16:00', venue:'Maracanã' }),
      mk({ teamId:'flamengo', opp:'Botafogo', oppShort:'BOT', comp:'Brasileirão',
        date:'2026-08-30T16:00', venue:'Maracanã', sectors: classA(100) }),
    ];
  }

  // ── PERSISTENCIA ─────────────────────────────────────────
  function load(key, fallback) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
    catch (e) { return fallback; }
  }
  function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {} }

  let matches = load(KEY_MATCHES, null);
  if (!matches) { matches = seedMatches(); save(KEY_MATCHES, matches); }

  let bookings = load(KEY_BOOKINGS, []);

  // ── API ──────────────────────────────────────────────────
  function allMatches() { return matches.slice().sort((a,b)=> new Date(a.date)-new Date(b.date)); }
  function matchesByTeam(teamId) { return allMatches().filter(m => m.teamId === teamId); }
  function upcomingByTeam(teamId) { return matchesByTeam(teamId).filter(m => !isPast(m)); }
  function getMatch(id) { return matches.find(m => m.id === id); }
  function isPast(m) { return new Date(m.date).getTime() < Date.now(); }

  function saveMatch(m) {
    const i = matches.findIndex(x => x.id === m.id);
    if (i >= 0) matches[i] = m; else matches.push(m);
    save(KEY_MATCHES, matches);
  }
  function deleteMatch(id) { matches = matches.filter(m => m.id !== id); save(KEY_MATCHES, matches); }
  function newMatchTemplate(teamId) {
    return {
      id: 'm_' + Math.random().toString(36).slice(2, 9),
      teamId: teamId || 'flamengo', opp:'', oppShort:'', comp:'Brasileirão',
      date: new Date(Date.now()+7*864e5).toISOString().slice(0,16), venue:'Maracanã',
      status:'on-sale', includes:['Entrada','Guiamiento en 3 idiomas','Transporte ida y vuelta'],
      sectors: SECTOR_DEFS.map(s => ({ id:s.id, price:s.defaultPrice, available:true })),
    };
  }

  // ── RESERVAS / COMPRA ────────────────────────────────────
  // Política: pago 100% del valor. Cancelación hasta 7 días antes.
  function createBooking({ matchId, sectorId, qty, name, email }) {
    const m = getMatch(matchId);
    const sec = m.sectors.find(s => s.id === sectorId);
    const unit = sec.price;
    const total = unit * qty;
    const b = {
      id: 'FE-' + Math.random().toString(36).slice(2, 8).toUpperCase(),
      matchId, sectorId, qty, name, email,
      unit, total, paid: total, // 100%
      createdAt: Date.now(),
      matchDate: m.date,
      status: 'confirmed',
    };
    bookings.unshift(b);
    save(KEY_BOOKINGS, bookings);
    return b;
  }
  function getBookings() { return bookings.slice(); }
  function canCancel(b) {
    const matchTime = new Date(b.matchDate).getTime();
    return b.status === 'confirmed' && (matchTime - Date.now()) >= 7 * 864e5;
  }
  function cancelBooking(id) {
    const b = bookings.find(x => x.id === id);
    if (b && canCancel(b)) { b.status = 'cancelled'; save(KEY_BOOKINGS, bookings); return true; }
    return false;
  }
  function resetData() { matches = seedMatches(); save(KEY_MATCHES, matches); bookings = []; save(KEY_BOOKINGS, bookings); }

  // ── FAQ (chatbot) ────────────────────────────────────────
  const FAQ = [
    { q:'¿Qué incluye la entrada?', a:'Todas nuestras entradas son servicio completo: incluyen el acceso al estadio, guiamiento en 3 idiomas (español, inglés y portugués) y transporte ida y vuelta.' },
    { q:'¿Cómo es el acceso al estadio?', a:'El acceso es biométrico: tu rostro es tu entrada. Te registras una vez vía Bepass y entras sin filas ni ticket de papel.' },
    { q:'¿Puedo cancelar mi compra?', a:'Sí. Puedes cancelar hasta 7 días (1 semana) antes del partido y se te reembolsa el 100%. Pasado ese plazo la compra no es reembolsable.' },
    { q:'¿Cuánto cuesta y cómo pago?', a:'El precio varía por sector y por partido. Tu anfitrión te confirma el precio final por WhatsApp y ahí coordinan el pago (los precios de referencia pueden cambiar de un partido a otro).' },
    { q:'¿Qué sectores hay en el Maracanã?', a:'Leste Inferior, Leste Superior, Norte, Sul, Maracanã Mais (Oeste, premium) y Visitante. Los precios cambian según el partido.' },
    { q:'¿El transporte de dónde sale?', a:'Coordinamos un punto de embarque y un anfitrión te acompaña ida y vuelta. La hora exacta se confirma por WhatsApp.' },
    { q:'¿Atienden por WhatsApp?', a:'Sí, tienes un anfitrión por WhatsApp para coordinar tu embarque y resolver cualquier duda antes, durante y después del partido.' },
  ];

  const WHATSAPP = '5521999990000'; // número de contacto (placeholder)

  return {
    TEAMS, SECTOR_DEFS, sectorDef, FAQ, WHATSAPP,
    allMatches, matchesByTeam, upcomingByTeam, getMatch, isPast,
    saveMatch, deleteMatch, newMatchTemplate,
    createBooking, getBookings, canCancel, cancelBooking, resetData,
    fmt: (n) => 'R$ ' + Number(n).toLocaleString('pt-BR'),
  };
})();

</script>

  const PHONE = (window.MRC && window.MRC.WHATSAPP) || '5521999990000';

  const css = `
  .mrc-fab-wrap { position: fixed; right: 22px; bottom: 22px; z-index: 9000; display:flex; flex-direction:column; align-items:flex-end; gap: 14px; font-family: Inter, system-ui, sans-serif; }
  .mrc-fab { width: 58px; height: 58px; border-radius: 50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow: 0 10px 30px rgba(0,0,0,0.4); transition: transform .2s cubic-bezier(.22,1,.36,1); position:relative; }
  .mrc-fab:hover { transform: translateY(-3px) scale(1.05); }
  .mrc-fab.wa { background: #25D366; }
  .mrc-fab.bot { background: #fff; }
  .mrc-fab .mrc-badge { position:absolute; top:-3px; right:-3px; width:18px; height:18px; border-radius:50%; background:#d11a2a; color:#fff; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; border:2px solid #070708; }
  .mrc-fab .mrc-tip { position:absolute; right: 70px; white-space:nowrap; background:#111; color:#f4f4f0; font-size:12px; padding:8px 12px; border-radius:10px; opacity:0; pointer-events:none; transform: translateX(6px); transition: all .2s; box-shadow:0 8px 24px rgba(0,0,0,.4); }
  .mrc-fab:hover .mrc-tip { opacity:1; transform:none; }

  .mrc-chat { position: fixed; right: 22px; bottom: 92px; z-index: 9001; width: 360px; max-width: calc(100vw - 44px); height: 520px; max-height: calc(100vh - 130px); background:#0f0f12; border:1px solid rgba(255,255,255,0.12); border-radius: 20px; box-shadow: 0 30px 70px rgba(0,0,0,0.6); display:none; flex-direction:column; overflow:hidden; font-family: Inter, system-ui, sans-serif; }
  .mrc-chat.open { display:flex; animation: mrcUp .3s cubic-bezier(.22,1,.36,1); }
  @keyframes mrcUp { from{opacity:0; transform:translateY(20px)} to{opacity:1; transform:none} }
  .mrc-chat-head { background: linear-gradient(135deg,#1a1a1f,#0f0f12); padding: 16px 18px; display:flex; align-items:center; gap:12px; border-bottom:1px solid rgba(255,255,255,0.08); }
  .mrc-chat-head .av { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,#d11a2a,#0e5c2f); display:flex; align-items:center; justify-content:center; font-family:'Barlow Condensed',sans-serif; font-weight:800; color:#fff; font-size:16px; }
  .mrc-chat-head .t { flex:1; }
  .mrc-chat-head .t b { color:#f4f4f0; font-size:14px; display:block; }
  .mrc-chat-head .t span { color:#8a8a92; font-size:11px; display:flex; align-items:center; gap:5px; }
  .mrc-chat-head .t span i { width:6px; height:6px; border-radius:50%; background:#46e08a; display:inline-block; }
  .mrc-chat-head button { background:none; border:none; color:#8a8a92; cursor:pointer; padding:4px; }
  .mrc-chat-body { flex:1; overflow-y:auto; padding: 16px; display:flex; flex-direction:column; gap:10px; background:#0b0b0e; }
  .mrc-msg { max-width:85%; padding:10px 13px; border-radius:14px; font-size:13px; line-height:1.45; }
  .mrc-msg.bot { align-self:flex-start; background:#1c1c22; color:#f4f4f0; border-bottom-left-radius:4px; }
  .mrc-msg.user { align-self:flex-end; background:#d11a2a; color:#fff; border-bottom-right-radius:4px; }
  .mrc-chips { display:flex; flex-wrap:wrap; gap:8px; padding: 12px 16px; border-top:1px solid rgba(255,255,255,0.08); background:#0f0f12; }
  .mrc-chip { padding:8px 12px; border-radius:999px; border:1px solid rgba(255,255,255,0.18); background:transparent; color:#cfcfd4; font-size:12px; cursor:pointer; transition: all .2s; font-family:inherit; }
  .mrc-chip:hover { background:#fff; color:#111; border-color:#fff; }
  .mrc-chat-foot { padding:10px 16px; border-top:1px solid rgba(255,255,255,0.08); background:#0f0f12; }
  .mrc-chat-foot a { display:flex; align-items:center; justify-content:center; gap:8px; background:#25D366; color:#fff; text-decoration:none; padding:11px; border-radius:12px; font-size:13px; font-weight:600; }
  `;
  const style = document.createElement('style');
  style.textContent = css;
  document.head.appendChild(style);

  const waHref = (txt) => `https://wa.me/${PHONE}?text=${encodeURIComponent(txt || 'Hola, quiero información sobre las entradas para el Maracanã')}`;

  const wrap = document.createElement('div');
  wrap.className = 'mrc-fab-wrap';
  wrap.innerHTML = `
    <div class="mrc-chat" id="mrcChat">
      <div class="mrc-chat-head">
        <div class="av">FE</div>
        <div class="t"><b>Asistente Football Experience</b><span><i></i> en línea · responde al instante</span></div>
        <button id="mrcChatClose" aria-label="Cerrar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
      </div>
      <div class="mrc-chat-body" id="mrcChatBody"></div>
      <div class="mrc-chips" id="mrcChips"></div>
      <div class="mrc-chat-foot">
        <a href="${waHref()}" target="_blank" rel="noopener">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.1-1.8-.9-2-1-.3-.1-.5-.1-.7.1-.2.3-.8 1-.9 1.2-.2.1-.3.2-.6.1-.3-.2-1.3-.5-2.4-1.5-.9-.8-1.5-1.8-1.7-2.1-.2-.3 0-.4.1-.6l.5-.5c.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5 0-.1-.7-1.6-.9-2.2-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.5s1.1 2.9 1.2 3.1c.1.2 2.1 3.2 5.1 4.5.7.3 1.3.5 1.7.6.7.2 1.4.2 1.9.1.6-.1 1.8-.7 2-1.4.2-.7.2-1.3.2-1.4-.1-.1-.3-.2-.6-.4M12 2a10 10 0 00-8.6 15l-1 3.6 3.7-1A10 10 0 1012 2z"/></svg>
          Hablar con un anfitrión por WhatsApp
        </a>
      </div>
    </div>
    <button class="mrc-fab bot" id="mrcBotFab" aria-label="Preguntas frecuentes">
      <span class="mrc-tip">¿Dudas? Pregúntame</span>
      <span class="mrc-badge">?</span>
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10z" stroke="#111" stroke-width="1.8" stroke-linejoin="round"/><circle cx="9" cy="10" r="1.1" fill="#111"/><circle cx="13" cy="10" r="1.1" fill="#111"/></svg>
    </button>
    <a class="mrc-fab wa" href="${waHref()}" target="_blank" rel="noopener" aria-label="WhatsApp">
      <span class="mrc-tip">Escríbenos por WhatsApp</span>
      <svg width="30" height="30" viewBox="0 0 24 24" fill="#fff"><path d="M17.5 14.4c-.3-.1-1.8-.9-2-1-.3-.1-.5-.1-.7.1-.2.3-.8 1-.9 1.2-.2.1-.3.2-.6.1-.3-.2-1.3-.5-2.4-1.5-.9-.8-1.5-1.8-1.7-2.1-.2-.3 0-.4.1-.6l.5-.5c.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5 0-.1-.7-1.6-.9-2.2-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.5s1.1 2.9 1.2 3.1c.1.2 2.1 3.2 5.1 4.5.7.3 1.3.5 1.7.6.7.2 1.4.2 1.9.1.6-.1 1.8-.7 2-1.4.2-.7.2-1.3.2-1.4-.1-.1-.3-.2-.6-.4M12 2a10 10 0 00-8.6 15l-1 3.6 3.7-1A10 10 0 1012 2z"/></svg>
    </a>
  `;
  document.body.appendChild(wrap);

  const chat = wrap.querySelector('#mrcChat');
  const body = wrap.querySelector('#mrcChatBody');
  const chips = wrap.querySelector('#mrcChips');

  function addMsg(text, who) {
    const m = document.createElement('div');
    m.className = 'mrc-msg ' + who;
    m.innerHTML = text;
    body.appendChild(m);
    body.scrollTop = body.scrollHeight;
  }
  function renderChips() {
    chips.innerHTML = '';
    FAQ.forEach(f => {
      const c = document.createElement('button');
      c.className = 'mrc-chip';
      c.textContent = f.q;
      c.addEventListener('click', () => {
        addMsg(f.q, 'user');
        setTimeout(() => addMsg(f.a, 'bot'), 350);
      });
      chips.appendChild(c);
    });
  }
  let greeted = false;
  function openChat() {
    chat.classList.add('open');
    if (!greeted) {
      greeted = true;
      addMsg('¡Hola! 👋 Soy el asistente de <b>Football Experience</b>. Toca una pregunta o escríbenos por WhatsApp.', 'bot');
      renderChips();
    }
  }
  wrap.querySelector('#mrcBotFab').addEventListener('click', () => {
    chat.classList.contains('open') ? chat.classList.remove('open') : openChat();
  });
  wrap.querySelector('#mrcChatClose').addEventListener('click', () => chat.classList.remove('open'));
})();

</script>
<script>
(function(){
  const { TEAMS, getMatch, getBookings, canCancel, cancelBooking, sectorDef, fmt, isPast, WHATSAPP } = MRC;
  let tab='all';
  const crestBg=(t)=>`linear-gradient(135deg,${t.primary},${t.secondary||'#111'})`;

  function qr(){ // mini deterministic qr
    let r='<svg viewBox="0 0 10 10" width="100%" height="100%">';
    for(let y=0;y<10;y++)for(let x=0;x<10;x++){ if(((x*3+y*7+x*y)%3)===0) r+=`<rect x="${x}" y="${y}" width="1" height="1" fill="#0a0a0a"/>`; }
    r+='<rect x="0" y="0" width="3" height="3" fill="none" stroke="#0a0a0a" stroke-width="0.6"/><rect x="7" y="0" width="3" height="3" fill="none" stroke="#0a0a0a" stroke-width="0.6"/>';
    return r+'</svg>';
  }

  function render(){
    const wrap=document.getElementById('list');
    let bks=getBookings();
    if(tab==='confirmed') bks=bks.filter(b=>b.status==='confirmed');
    if(tab==='cancelled') bks=bks.filter(b=>b.status==='cancelled');

    if(!bks.length){
      wrap.innerHTML=`<div class="empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none"><path d="M3 8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2 2 2 0 0 0 0 4 2 2 0 0 1-2 2H5a2 2 0 0 1-2-2 2 2 0 0 0 0-4z" stroke="currentColor" stroke-width="1.5"/></svg>
        <div>No tienes reservas ${tab==='cancelled'?'canceladas':tab==='confirmed'?'activas':''} todavía.</div>
        <div style="margin-top:10px"><a href="inicio.html">Comprar una entrada →</a></div>
      </div>`;
      return;
    }
    wrap.innerHTML='';
    bks.forEach(b=>{
      const m=getMatch(b.matchId);
      const team=m?TEAMS[m.teamId]:TEAMS.flamengo;
      const def=sectorDef(b.sectorId);
      const dt=new Date(b.matchDate);
      const day=dt.toLocaleDateString('es',{weekday:'short',day:'2-digit',month:'short'});
      const time=dt.toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
      const past=isPast({date:b.matchDate});
      const state = b.status==='cancelled'?'cancelled':(past?'past':'confirmed');
      const stateLabel = b.status==='cancelled'?'CANCELADA':(past?'FINALIZADO':'CONFIRMADA');
      const cancellable = canCancel(b);
      const daysLeft = Math.ceil((dt.getTime()-Date.now())/864e5);

      const el=document.createElement('div'); el.className='bk';
      el.innerHTML=`
        <div class="bk-top">
          <div class="bk-crest" style="background:${crestBg(team)}">${team.short}</div>
          <div class="bk-info">
            <div class="vs">${team.short} × ${m?(m.oppShort||m.opp):'—'}</div>
            <div class="meta">${day} · ${time} · ${m?m.venue:'Maracanã'} · ${def?def.name:''} · ${b.qty} ${b.qty===1?'entrada':'entradas'}</div>
          </div>
          <span class="bk-state ${state}">${stateLabel}</span>
        </div>
        <div class="bk-foot">
          ${b.status!=='cancelled'?`<div class="qr">${qr()}</div>`:''}
          <div>
            <div class="kv">Reserva <b>${b.id}</b></div>
            <div class="kv">Total <b>${fmt(b.total)}</b> · pagado 100%</div>
          </div>
          <div class="sp"></div>
          ${b.status==='confirmed'&&!past?`
            <a class="act wa" href="https://wa.me/${WHATSAPP}?text=${encodeURIComponent('Hola, consulta sobre mi reserva '+b.id)}" target="_blank" rel="noopener">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.1-1.8-.9-2-1-.3-.1-.5-.1-.7.1-.2.3-.8 1-.9 1.2-.2.1-.3.2-.6.1-.3-.2-1.3-.5-2.4-1.5-.9-.8-1.5-1.8-1.7-2.1-.2-.3 0-.4.1-.6l.5-.5c.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5 0-.1-.7-1.6-.9-2.2-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.5s1.1 2.9 1.2 3.1c.1.2 2.1 3.2 5.1 4.5.7.3 1.3.5 1.7.6.7.2 1.4.2 1.9.1.6-.1 1.8-.7 2-1.4.2-.7.2-1.3.2-1.4-.1-.1-.3-.2-.6-.4M12 2a10 10 0 00-8.6 15l-1 3.6 3.7-1A10 10 0 1012 2z"/></svg>
              Anfitrión
            </a>
            <button class="act cancel" data-cancel="${b.id}" ${cancellable?'':'disabled'}>Cancelar</button>
          `:''}
        </div>
        ${b.status==='confirmed'&&!past?`<div style="padding:0 20px 14px"><span class="cancel-note">${cancellable?`Cancelación gratuita disponible (faltan ${daysLeft} días · límite 7 días antes).`:`Ya no se puede cancelar: faltan menos de 7 días para el partido.`}</span></div>`:''}
      `;
      wrap.appendChild(el);
    });
    wrap.querySelectorAll('[data-cancel]').forEach(btn=>btn.addEventListener('click',()=>{
      if(confirm('¿Cancelar esta reserva? Se reembolsará el 100% del valor.')){
        if(cancelBooking(btn.dataset.cancel)) render();
      }
    }));
  }
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on')); t.classList.add('on'); tab=t.dataset.t; render();
  }));
  render();
})();
</script>
</body>
</html>
