name: Actualizar tabla Brasileirao

on:
  schedule:
    # cada hora, en el minuto 0 (UTC)
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-tabla:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm install --no-save campeonato-brasileiro-api

      - name: Generar tabla.json
        run: node scripts/update-tabla.js

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tabla.json
          git diff --cached --quiet || git commit -m "chore: actualizar tabla Brasileirao [skip ci]"
          git push
